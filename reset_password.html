<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔐 Reset Password - Movie Recommender</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #0a0a2a;
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            max-width: 450px;
            padding: 30px;
        }
        .card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 30px;
            backdrop-filter: blur(10px);
        }
        .card h2 {
            color: #4ecdc4;
            margin-bottom: 20px;
            text-align: center;
        }
        .card p {
            color: #aaaaaa;
            text-align: center;
            margin-bottom: 25px;
            font-size: 0.95rem;
        }
        .form-control {
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            padding: 12px;
            border-radius: 10px;
        }
        .form-control:focus {
            background: rgba(0,0,0,0.4);
            border-color: #4ecdc4;
            color: white;
            box-shadow: none;
        }
        .form-control::placeholder {
            color: #666;
        }
        .btn-primary {
            background: #4ecdc4;
            border: none;
            padding: 12px;
            width: 100%;
            font-weight: bold;
            border-radius: 10px;
            color: black;
        }
        .btn-primary:hover {
            background: #45b8b0;
            transform: scale(1.02);
        }
        .btn-secondary {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            padding: 10px;
            width: 100%;
            border-radius: 10px;
            text-decoration: none;
            text-align: center;
            display: block;
        }
        .btn-secondary:hover {
            background: rgba(255,255,255,0.2);
            color: white;
        }
        .flash-messages {
            margin-bottom: 15px;
        }
        .flash-message {
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 8px;
            text-align: center;
        }
        .flash-message.success {
            background: rgba(46, 204, 113, 0.2);
            border: 1px solid #2ecc71;
            color: #2ecc71;
        }
        .flash-message.danger {
            background: rgba(231, 76, 60, 0.2);
            border: 1px solid #e74c3c;
            color: #e74c3c;
        }
        .flash-message.info {
            background: rgba(52, 152, 219, 0.2);
            border: 1px solid #3498db;
            color: #3498db;
        }
        .brand {
            text-align: center;
            font-size: 2rem;
            margin-bottom: 20px;
        }
        .brand span {
            color: #ff6b6b;
        }
        .password-requirements {
            color: #666;
            font-size: 0.85rem;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="brand">
            🎬 <span>Movie Recommender</span>
        </div>
        
        <div class="card">
            <h2>🔐 Reset Password</h2>
            <p>Enter your new password below.</p>
            
            <div class="flash-messages">
                {% with messages = get_flashed_messages(with_categories=true) %}
                    {% if messages %}
                        {% for category, message in messages %}
                            <div class="flash-message {{ category }}">{{ message }}</div>
                        {% endfor %}
                    {% endif %}
                {% endwith %}
            </div>
            
            <form method="POST">
                <div class="mb-3">
                    <input type="password" name="new_password" class="form-control" placeholder="🔑 New Password" required minlength="6">
                    <div class="password-requirements">Must be at least 6 characters</div>
                </div>
                <div class="mb-3">
                    <input type="password" name="confirm_password" class="form-control" placeholder="✅ Confirm Password" required>
                </div>
                <button type="submit" class="btn btn-primary">🔐 Reset Password</button>
            </form>
            
            <hr style="border-color: rgba(255,255,255,0.1); margin: 20px 0;">
            
            <a href="/login" class="btn-secondary">← Back to Login</a>
        </div>
    </div>
</body>
</html>

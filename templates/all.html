<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Movies</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background: #0a0a2a;
            color: white;
        }
        .header {
            background: rgba(0,0,0,0.5);
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #ff6b6b;
        }
        .header h1 {
            color: #ff6b6b;
        }
        .header a {
            color: white;
            text-decoration: none;
            padding: 8px 20px;
            border-radius: 20px;
            transition: 0.3s;
        }
        .header a:hover {
            background: #ff6b6b;
        }
        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .back-btn {
            display: inline-block;
            background: #4ecdc4;
            color: #0a0a2a;
            padding: 10px 20px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: bold;
            margin-bottom: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            overflow: hidden;
        }
        th {
            background: #ff6b6b;
            color: white;
            padding: 15px;
            text-align: left;
        }
        td {
            padding: 12px 15px;
            border-bottom: 1px solid #333;
        }
        tr:hover {
            background: rgba(255,255,255,0.05);
        }
        .footer {
            text-align: center;
            padding: 30px;
            color: #666;
            border-top: 1px solid #222;
            margin-top: 50px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🎬 Movie Recommender</h1>
        <div>
            <a href="/">Home</a>
            <a href="/all">All Movies</a>
        </div>
    </div>

    <div class="container">
        <a href="/" class="back-btn">← Back</a>
        <h2 style="margin-bottom: 20px;">📽️ All Movies ({{ movies|length }})</h2>
        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>Title</th>
                    <th>Genre</th>
                    <th>Year</th>
                    <th>Rating</th>
                </tr>
            </thead>
            <tbody>
                {% for movie in movies %}
                <tr>
                    <td>{{ loop.index }}</td>
                    <td>{{ movie.title }}</td>
                    <td>{{ movie.genre }}</td>
                    <td>{{ movie.year }}</td>
                    <td>⭐ {{ movie.rating }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

    <div class="footer">
        <p>🎬 Simple Movie Recommender | Built with Python & Flask</p>
    </div>
</body>
</html>

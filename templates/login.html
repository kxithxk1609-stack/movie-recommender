<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Movie Recommender</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #0a0a2a 0%, #1a0a3a 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .auth-container {
            background: rgba(0, 0, 0, 0.7);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid #ff6b6b;
            width: 100%;
            max-width: 400px;
            backdrop-filter: blur(10px);
        }

        .auth-container h1 {
            color: #ff6b6b;
            text-align: center;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #aaa;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #333;
            background: rgba(255, 255, 255, 0.05);
            color: white;
            font-size: 1rem;
        }

        .form-group input:focus {
            outline: none;
            border-color: #ff6b6b;
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: #ff6b6b;
            color: white;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            transform: scale(1.02);
            background: #ff5555;
        }

        .auth-links {
            text-align: center;
            margin-top: 20px;
            color: #888;
        }

        .auth-links a {
            color: #ff6b6b;
            text-decoration: none;
        }

        .auth-links a:hover {
            text-decoration: underline;
        }

        .flash-messages {
            margin-bottom: 20px;
        }

        .flash-message {
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 10px;
        }

        .flash-message.success {
            background: rgba(46, 204, 113, 0.2);
            border: 1px solid #2ecc71;
            color: #2ecc71;
        }

        .flash-message.danger {
            background: rgba(231, 76, 60, 0.2);
            border: 1px solid #e74c3c;
            color: #e74c3c;
        }

        .flash-message.info {
            background: rgba(52, 152, 219, 0.2);
            border: 1px solid #3498db;
            color: #3498db;
        }

        /* ===== NEW: SOCIAL LOGIN BUTTONS ===== */
        .social-login {
            margin-top: 25px;
            text-align: center;
        }

        .social-login p {
            color: #aaa;
            margin-bottom: 15px;
            font-size: 0.9rem;
        }

        .social-login .divider {
            display: flex;
            align-items: center;
            margin: 20px 0;
        }

        .social-login .divider::before,
        .social-login .divider::after {
            content: "";
            flex: 1;
            border-bottom: 1px solid #333;
        }

        .social-login .divider span {
            padding: 0 15px;
            color: #666;
            font-size: 0.85rem;
        }

        .social-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .social-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.9rem;
            transition: 0.3s;
            flex: 1;
            justify-content: center;
            min-width: 120px;
        }

        .social-btn:hover {
            transform: scale(1.05);
        }

        .social-btn.google {
            background: #fff;
            color: #333;
            border: 1px solid #ddd;
        }

        .social-btn.google:hover {
            background: #f1f1f1;
        }

        .social-btn.facebook {
            background: #1877f2;
            color: white;
        }

        .social-btn.facebook:hover {
            background: #1664d9;
        }

        .social-btn img {
            width: 18px;
            height: 18px;
        }

        .social-btn svg {
            width: 18px;
            height: 18px;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <h1>🔐 Login</h1>

        <div class="flash-messages">
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="flash-message {{ category }}">{{ message }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}
        </div>

        <form method="POST">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" required placeholder="Enter your username">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required placeholder="Enter your password">
            </div>
            <button type="submit" class="btn">🔓 Login</button>
        </form>

        <!-- ===== NEW: SOCIAL LOGIN ===== -->
        <div class="social-login">
            <div class="divider">
                <span>or continue with</span>
            </div>
            <div class="social-buttons">
                <a href="/login/google" class="social-btn google">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 48 48">
                        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
                        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
                    </svg>
                    Google
                </a>
                <a href="/login/facebook" class="social-btn facebook">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="white">
                        <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
                    </svg>
                    Facebook
                </a>
            </div>
        </div>

        <!-- ===== FORGOT PASSWORD LINK ===== -->
        <div style="text-align: center; margin-top: 15px;">
            <a href="/forgot-password" style="color: #4ecdc4; text-decoration: none; font-size: 0.9rem;">
                🔐 Forgot Password?
            </a>
        </div>

        <div class="auth-links">
            Don't have an account? <a href="/register">Register here</a>
        </div>
    </div>
</body>
</html>
